<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | EMAGE GALAXY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="./variables.css" rel="stylesheet">
  <link href="./main.css" rel="stylesheet">
  <link href="./components.css" rel="stylesheet">
  <link href="./pages.css" rel="stylesheet">
  <link href="./theme.css" rel="stylesheet">
  <link href="./responsive.css" rel="stylesheet">
</head>
<body>
  <div class="dynamic-bg"></div>
  <div id="navbar-placeholder"></div>

  <main class="page-content main-content page-transition">
    <div class="page-header">
      <div class="container">
        <h1 data-aos="fade-up">Contact <span class="text-gradient">Us</span></h1>
        <p data-aos="fade-up" data-aos-delay="100">We'd love to hear from you. Send us a message!</p>
      </div>
    </div>

    <section class="section pt-0">
      <div class="container">
        <div class="row g-4 mb-5">
          <div class="col-md-4" data-aos="fade-up">
            <div class="contact-info-card">
              <i class="fas fa-envelope"></i>
              <h5>Email</h5>
              <p style="color:var(--text-secondary);">support@emagegalaxy.com</p>
            </div>
          </div>
          <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
            <div class="contact-info-card">
              <i class="fas fa-phone"></i>
              <h5>Phone</h5>
              <p style="color:var(--text-secondary);">+1 (555) 123-4567</p>
            </div>
          </div>
          <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
            <div class="contact-info-card">
              <i class="fas fa-map-marker-alt"></i>
              <h5>Location</h5>
              <p style="color:var(--text-secondary);">San Francisco, CA</p>
            </div>
          </div>
        </div>

        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="glass-card p-4" data-aos="fade-up">
              <form id="contactForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label-galaxy" for="contactName">Name</label>
                    <input type="text" class="form-glass" id="contactName" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-galaxy" for="contactEmail">Email</label>
                    <input type="email" class="form-glass" id="contactEmail" required>
                  </div>
                  <div class="col-12">
                    <label class="form-label-galaxy" for="contactSubject">Subject</label>
                    <input type="text" class="form-glass" id="contactSubject" required>
                  </div>
                  <div class="col-12">
                    <label class="form-label-galaxy" for="contactMessage">Message</label>
                    <textarea class="form-glass" id="contactMessage" rows="5" required></textarea>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn-galaxy"><i class="fas fa-paper-plane"></i> Send Message</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="./storage.js"></script>
  <script src="./wallpapers-data.js"></script>
  <script src="./theme.js"></script>
  <script src="./auth.js"></script>
  <script src="./access.js"></script>
  <script src="./components.js"></script>
  <script src="./wallpapers.js"></script>
  <script src="./main.js"></script>
</body>
</html>
