<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Upload | EMAGE GALAXY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="./variables.css" rel="stylesheet">
  <link href="./main.css" rel="stylesheet">
  <link href="./components.css" rel="stylesheet">
  <link href="./pages.css" rel="stylesheet">
  <link href="./theme.css" rel="stylesheet">
  <link href="./responsive.css" rel="stylesheet">
</head>
<body>
  <div class="dynamic-bg"></div>
  <div id="navbar-placeholder"></div>

  <main class="page-content main-content page-transition">
    <div class="page-header">
      <div class="container">
        <h1><i class="fas fa-cloud-upload-alt"></i> Prime <span class="text-gradient">Upload</span></h1>
        <p>Share your wallpapers with the EMAGE GALAXY community</p>
      </div>
    </div>

    <section class="section pt-0">
      <div class="container">
        <div id="uploadRestricted" class="glass-card p-4 text-center d-none">
          <i class="fas fa-crown fa-3x mb-3" style="color:var(--gold);"></i>
          <h4>Prime Membership Required</h4>
          <p style="color:var(--text-secondary);">Only <strong>Prime Users</strong> can upload wallpapers. Login users can browse, download, rate, and comment.</p>
          <a href="subscription.html" class="btn-galaxy mt-3"><i class="fas fa-crown"></i> Upgrade to Prime</a>
        </div>

        <div class="row justify-content-center">
          <div class="col-lg-8">
            <form id="uploadForm" class="glass-card p-4">
              <div class="upload-zone" id="uploadZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <h5>Drag & Drop your wallpaper here</h5>
                <p style="color:var(--text-muted);">or click to browse files</p>
                <input type="file" id="fileInput" accept="image/*" hidden>
              </div>
              <img id="uploadPreview" class="upload-preview" alt="Preview">

              <div class="row mt-4 g-3">
                <div class="col-md-6">
                  <label class="form-label-galaxy" for="uploadTitle">Title</label>
                  <input type="text" class="form-glass" id="uploadTitle" placeholder="Wallpaper title" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label-galaxy" for="uploadCategory">Category</label>
                  <select class="form-glass" id="uploadCategory" required>
                    <option value="">Select category</option>
                    <option>Space</option><option>Galaxy</option><option>Nature</option>
                    <option>Cars</option><option>Technology</option><option>Anime</option>
                    <option>Cities</option><option>Animals</option><option>Abstract</option>
                    <option>Minimal</option><option>Sports</option><option>Gaming</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label-galaxy" for="uploadTags">Tags</label>
                  <input type="text" class="form-glass" id="uploadTags" placeholder="4K, HD, Dark (comma separated)">
                </div>
                <div class="col-md-6">
                  <label class="form-label-galaxy" for="uploadResolution">Resolution</label>
                  <select class="form-glass" id="uploadResolution" required>
                    <option value="1920x1080">1920x1080 (Full HD)</option>
                    <option value="2560x1440">2560x1440 (2K)</option>
                    <option value="3840x2160">3840x2160 (4K)</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn-galaxy w-100 mt-4"><i class="fas fa-upload"></i> Upload Wallpaper</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./storage.js"></script>
  <script src="./wallpapers-data.js"></script>
  <script src="./theme.js"></script>
  <script src="./auth.js"></script>
  <script src="./access.js"></script>
  <script src="./components.js"></script>
  <script src="./wallpapers.js"></script>
  <script src="./main.js"></script>
</body>
</html>
