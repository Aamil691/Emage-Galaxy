<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | EMAGE GALAXY</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="./variables.css" rel="stylesheet">
  <link href="./main.css" rel="stylesheet">
  <link href="./components.css" rel="stylesheet">
  <link href="./pages.css" rel="stylesheet">
  <link href="./animations.css" rel="stylesheet">
  <link href="./theme.css" rel="stylesheet">
  <link href="./responsive.css" rel="stylesheet">
</head>
<body>
  <div class="dynamic-bg"></div>
  <div id="navbar-placeholder"></div>

  <main class="page-content auth-page">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join EMAGE GALAXY and explore premium wallpapers</p>
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label-galaxy" for="regName">Full Name</label>
          <input type="text" class="form-glass" id="regName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label-galaxy" for="regEmail">Email Address</label>
          <input type="email" class="form-glass" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label-galaxy" for="regPassword">Password</label>
          <input type="password" class="form-glass" id="regPassword" placeholder="Create password" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label-galaxy" for="regConfirm">Confirm Password</label>
          <input type="password" class="form-glass" id="regConfirm" placeholder="Confirm password" required>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="regTerms" required>
          <label class="form-check-label" for="regTerms" style="color:var(--text-secondary);font-size:0.85rem;">
            I agree to the <a href="terms.html">Terms & Conditions</a> and <a href="privacy.html">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn-galaxy w-100"><i class="fas fa-user-plus"></i> Register</button>
      </form>
      <p class="text-center mt-4" style="color:var(--text-secondary);font-size:0.9rem;">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./storage.js"></script>
  <script src="./wallpapers-data.js"></script>
  <script src="./theme.js"></script>
  <script src="./auth.js"></script>
  <script src="./access.js"></script>
  <script src="./components.js"></script>
  <script src="./wallpapers.js"></script>
  <script src="./main.js"></script>
</body>
</html>
